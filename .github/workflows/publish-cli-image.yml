name: Publish CLI Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Build CLI container image
        id: build-image
        shell: bash
        run: |
          image_path="$(nix build .#cli-container --print-out-paths --no-link)"
          echo "image_path=${image_path}" >> "${GITHUB_OUTPUT}"

      - name: Load image into Docker
        run: docker load --input "${{ steps.build-image.outputs.image_path }}"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: suicide/rrscli:latest
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push suicide/rrscli:latest
